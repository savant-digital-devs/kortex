services:
  postgres:
    image: postgres:16-alpine
    container_name: kortex_postgres
    environment:
      POSTGRES_USER: kortex
      POSTGRES_PASSWORD: kortex_secret
      POSTGRES_DB: kortex_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: kortex_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: kortex_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@kortex.dev
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data: